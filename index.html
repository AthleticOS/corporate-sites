    <script>
        const API_URL = "https://script.google.com/a/macros/athleticos.net/s/AKfycbzhqjm1IG_d9ho-_y4E2Y7Ht1Gp3gcoQDLXYdE3TIAF-TjBFbud6x5mFJpId7LB4mGM/exec";

        async function loadContent() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.Home && data.Home.Hero) {
                    document.getElementById('hero-headline').innerText = data.Home.Hero.Headline.text;
                    document.getElementById('hero-subtext').innerText = data.Home.Hero.Subtext.text;
                }
            } catch (error) {
                console.error("AthleticOS Logic Sync Failed:", error);
                document.getElementById('hero-headline').innerText = "Select Your Command Tier.";
                document.getElementById('hero-subtext').innerText = "AthleticOS provides bespoke logic engines tailored to your specific operational role.";
            }
        }
        
        loadContent();
    </script>

    <script>
        const canvas = document.getElementById('athleticosNetwork');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let nodes = [];
        const hubs = [];
        
        const COLOR_LIME_BASE = '82, 201, 32';      
        const COLOR_YELLOW_BASE = '249, 255, 0';    
        const COLOR_CARBON = '#1A1A1A';

        let mouse = { x: -1000, y: -1000, radius: 200 };

        function resize() {
            const wrapper = document.getElementById('athleticos-canvas-wrapper');
            width = canvas.width = wrapper.offsetWidth || window.innerWidth;
            height = canvas.height = wrapper.offsetHeight || window.innerHeight;
        }

        window.addEventListener('resize', () => {
            resize();
            initNetwork();
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        class Node {
            constructor(x, y, isHub = false) {
            this.x = x;
            this.y = y;
            this.baseX = x;
            this.baseY = y;
            this.isHub = isHub;
            
            this.baseSize = isHub ? 6 : Math.random() * 1.5 + 1;
            this.vx = (Math.random() - 0.5) * 0.8;
            this.vy = (Math.random() - 0.5) * 0.8;
            this.offset = Math.random() * 100; 
            }

            draw(time) {
            ctx.beginPath();
            
            if (this.isHub) {
                let currentSize = this.baseSize + Math.sin(time * 3 + this.offset) * 2;
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${COLOR_LIME_BASE}, 1)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${COLOR_LIME_BASE}, 0.8)`;
            } else {
                ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${COLOR_LIME_BASE}, 0.6)`;
                ctx.shadowBlur = 0; 
            }
            
            ctx.fill();
            }

            update(time) {
            if (!this.isHub) {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }

            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
                const forceDirectionX = dx / distance;
                const forceDirectionY = dy / distance;
                const force = (mouse.radius - distance) / mouse.radius; 
                const pushX = forceDirectionX * force * 4;
                const pushY = forceDirectionY * force * 4;
                
                this.x -= pushX;
                this.y -= pushY;
            } else {
                if (this.x !== this.baseX && this.isHub) this.x -= (this.x - this.baseX) * 0.05;
                if (this.y !== this.baseY && this.isHub) this.y -= (this.y - this.baseY) * 0.05;
            }

            this.draw(time);
            }
        }

        function initNetwork() {
            nodes = [];
            hubs.length = 0;
            
            hubs.push(new Node(width * 0.25, height * 0.4, true));
            hubs.push(new Node(width * 0.5, height * 0.6, true));
            hubs.push(new Node(width * 0.75, height * 0.35, true));
            
            hubs.forEach(hub => nodes.push(hub));

            let numberOfNodes = Math.floor((width * height) / 10000); 
            for (let i = 0; i < numberOfNodes; i++) {
            nodes.push(new Node(Math.random() * width, Math.random() * height));
            }
        }

        function drawBackground() {
            let gradientX = mouse.x !== -1000 ? mouse.x : width / 2;
            let gradientY = mouse.y !== -1000 ? mouse.y : height / 2;
            
            let bgGradient = ctx.createRadialGradient(gradientX, gradientY, 0, gradientX, gradientY, width * 0.6);
            bgGradient.addColorStop(0, '#023800'); 
            bgGradient.addColorStop(1, COLOR_CARBON); 
            
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
        }

        function connectAndStreamData(time) {
            ctx.shadowBlur = 0; 
            
            for (let a = 0; a < nodes.length; a++) {
            for (let b = a + 1; b < nodes.length; b++) {
                let dx = nodes[a].x - nodes[b].x;
                let dy = nodes[a].y - nodes[b].y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 150) {
                let opacity = 1 - (distance / 150);
                let isHubConnection = nodes[a].isHub || nodes[b].isHub;

                ctx.beginPath();
                ctx.moveTo(nodes[a].x, nodes[a].y);
                ctx.lineTo(nodes[b].x, nodes[b].y);
                
                if (isHubConnection) {
                    ctx.strokeStyle = `rgba(${COLOR_LIME_BASE}, ${opacity * 0.6})`;
                    ctx.lineWidth = 1.2;
                } else {
                    ctx.strokeStyle = `rgba(${COLOR_LIME_BASE}, ${opacity * 0.2})`;
                    ctx.lineWidth = 0.5;
                }
                ctx.stroke();

                if (isHubConnection && opacity > 0.3) {
                    let t = (time * 0.5 + nodes[b].offset) % 1; 
                    
                    let startNode = nodes[a].isHub ? nodes[b] : nodes[a];
                    let endNode = nodes[a].isHub ? nodes[a] : nodes[b];
                    
                    let packetX = startNode.x + (endNode.x - startNode.x) * t;
                    let packetY = startNode.y + (endNode.y - startNode.y) * t;

                    ctx.beginPath();
                    ctx.arc(packetX, packetY, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${COLOR_YELLOW_BASE}, ${opacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgba(${COLOR_YELLOW_BASE}, 1)`;
                    ctx.fill();
                    ctx.shadowBlur = 0; 
                }
                }
            }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            let time = Date.now() * 0.001; 
            
            drawBackground();
            
            connectAndStreamData(time);
            nodes.forEach(node => node.update(time));
        }

        resize();
        initNetwork();
        animate();
    </script>

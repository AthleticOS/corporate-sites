<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AthleticOS | Sovereign Logic Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#52C920',
                        secondary: '#F9FF00',
                        background: '#1A1A1A',
                        foreground: '#F5F8F1',
                        'deep-void': '#012300',
                    },
                    fontFamily: {
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                        ui: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <script src="components.js"></script>
</head>
<body class="bg-background text-foreground min-h-screen relative overflow-x-hidden font-body">

    <div id="athleticos-canvas-wrapper" class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden" style="background-color: #1A1A1A;">
        <canvas id="athleticosNetwork"></canvas>
    </div>

    <alpha-banner></alpha-banner>
    <global-header></global-header>

    <section class="relative pt-32 pb-20 md:pt-48 md:pb-32 min-h-[90vh] flex items-center">
        <div class="container relative z-10 mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center space-y-8">
                <h1 id="hero-headline" class="font-heading text-5xl md:text-7xl font-bold leading-tight tracking-tight text-foreground">
                    <span class="opacity-50 text-sm block mb-2 uppercase tracking-widest animate-pulse">Syncing Logic...</span>
                </h1>
                <p id="hero-subtext" class="font-body text-xl md:text-2xl text-foreground/70 max-w-2xl mx-auto leading-relaxed"></p>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-8 w-full max-w-3xl mx-auto">
                    <a href="/league" class="flex flex-col items-center justify-center gap-2 rounded-md px-8 py-6 bg-deep-void border border-primary/30 hover:border-primary hover:bg-primary/10 text-foreground hover:text-primary transition-all shadow-[0_0_20px_rgba(82,201,32,0.05)]">
                        <span class="font-ui uppercase tracking-widest text-sm font-bold">League Director</span>
                        <span class="font-body text-xs text-foreground/50">Macro-Level Logistics</span>
                    </a>
                    <a href="/ad" class="flex flex-col items-center justify-center gap-2 rounded-md px-8 py-6 bg-deep-void border border-secondary/30 hover:border-secondary hover:bg-secondary/10 text-foreground hover:text-secondary transition-all shadow-[0_0_20px_rgba(249,255,0,0.05)]">
                        <span class="font-ui uppercase tracking-widest text-sm font-bold">Athletic Director</span>
                        <span class="font-body text-xs text-foreground/50">Institutional Command</span>
                    </a>
                    <a href="/coach" class="flex flex-col items-center justify-center gap-2 rounded-md px-8 py-6 bg-deep-void border border-primary/30 hover:border-primary hover:bg-primary/10 text-foreground hover:text-primary transition-all shadow-[0_0_20px_rgba(82,201,32,0.05)]">
                        <span class="font-ui uppercase tracking-widest text-sm font-bold">Coach / Ops</span>
                        <span class="font-body text-xs text-foreground/50">Field-Level Execution</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <global-footer></global-footer>

    <script>
        const API_URL = "https://script.google.com/a/macros/athleticos.net/s/AKfycbzhqjm1IG_d9ho-_y4E2Y7Ht1Gp3gcoQDLXYdE3TIAF-TjBFbud6x5mFJpId7LB4mGM/exec";

        async function loadContent() {
            try {
                const response = await fetch(API_URL + "?t=" + new Date().getTime(), {
                    cache: 'no-store',
                    headers: { 'Pragma': 'no-cache' },
                    redirect: 'follow'
                });
                
                if (!response.ok) throw new Error("HTTP Status " + response.status);
                const data = await response.json();
                
                if(data.Home && data.Home.Hero) {
                    if (data.Home.Hero.Headline) document.getElementById('hero-headline').innerText = data.Home.Hero.Headline.text;
                    if (data.Home.Hero.Subtext) document.getElementById('hero-subtext').innerText = data.Home.Hero.Subtext.text;
                } else {
                    throw new Error("Missing 'Home' or 'Hero' object in Google Sheet.");
                }
            } catch (error) {
                console.error("AthleticOS Logic Sync Failed:", error);
                document.getElementById('hero-headline').innerText = "Data Alignment Error";
                document.getElementById('hero-subtext').innerHTML = "We connected to Google, but couldn't find the target text. <br><br>Check your Google Sheet and ensure Column A says exactly <strong>Home</strong> and Column B says <strong>Hero</strong>. Capitalization matters!";
                document.getElementById('hero-subtext').className = "font-body text-lg text-secondary border border-secondary/50 bg-secondary/10 p-4 rounded-xl max-w-2xl mx-auto leading-relaxed mt-6";
            }
        }
        
        loadContent();
    </script>

    <script>
        const canvas = document.getElementById('athleticosNetwork');
        const ctx = canvas.getContext('2d');
        let width, height;
        let nodes = [];
        const hubs = [];
        const COLOR_LIME_BASE = '82, 201, 32';      
        const COLOR_YELLOW_BASE = '249, 255, 0';    
        const COLOR_CARBON = '#1A1A1A';
        let mouse = { x: -1000, y: -1000, radius: 200 };

        function resize() {
            const wrapper = document.getElementById('athleticos-canvas-wrapper');
            width = canvas.width = wrapper.offsetWidth || window.innerWidth;
            height = canvas.height = wrapper.offsetHeight || window.innerHeight;
        }

        window.addEventListener('resize', () => { resize(); initNetwork(); });
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });

        class Node {
            constructor(x, y, isHub = false) {
                this.x = x; this.y = y; this.baseX = x; this.baseY = y; this.isHub = isHub;
                this.baseSize = isHub ? 6 : Math.random() * 1.5 + 1;
                this.vx = (Math.random() - 0.5) * 0.8; this.vy = (Math.random() - 0.5) * 0.8;
                this.offset = Math.random() * 100; 
            }
            draw(time) {
                ctx.beginPath();
                if (this.isHub) {
                    let currentSize = this.baseSize + Math.sin(time * 3 + this.offset) * 2;
                    ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${COLOR_LIME_BASE}, 1)`;
                    ctx.shadowBlur = 20; ctx.shadowColor = `rgba(${COLOR_LIME_BASE}, 0.8)`;
                } else {
                    ctx.arc(this.x, this.y, this.baseSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${COLOR_LIME_BASE}, 0.6)`;
                    ctx.shadowBlur = 0; 
                }
                ctx.fill();
            }
            update(time) {
                if (!this.isHub) {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx = -this.vx;
                    if (this.y < 0 || this.y > height) this.vy = -this.vy;
                }
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    const force = (mouse.radius - distance) / mouse.radius; 
                    this.x -= (dx / distance) * force * 4; this.y -= (dy / distance) * force * 4;
                } else {
                    if (this.x !== this.baseX && this.isHub) this.x -= (this.x - this.baseX) * 0.05;
                    if (this.y !== this.baseY && this.isHub) this.y -= (this.y - this.baseY) * 0.05;
                }
                this.draw(time);
            }
        }

        function initNetwork() {
            nodes = []; hubs.length = 0;
            hubs.push(new Node(width * 0.25, height * 0.4, true));
            hubs.push(new Node(width * 0.5, height * 0.6, true));
            hubs.push(new Node(width * 0.75, height * 0.35, true));
            hubs.forEach(hub => nodes.push(hub));
            for (let i = 0; i < Math.floor((width * height) / 10000); i++) {
                nodes.push(new Node(Math.random() * width, Math.random() * height));
            }
        }

        function drawBackground() {
            let gradientX = mouse.x !== -1000 ? mouse.x : width / 2;
            let gradientY = mouse.y !== -1000 ? mouse.y : height / 2;
            let bgGradient = ctx.createRadialGradient(gradientX, gradientY, 0, gradientX, gradientY, width * 0.6);
            bgGradient.addColorStop(0, '#023800'); bgGradient.addColorStop(1, COLOR_CARBON); 
            ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, width, height);
        }

        function connectAndStreamData(time) {
            ctx.shadowBlur = 0; 
            for (let a = 0; a < nodes.length; a++) {
                for (let b = a + 1; b < nodes.length; b++) {
                    let dx = nodes[a].x - nodes[b].x; let dy = nodes[a].y - nodes[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        let opacity = 1 - (distance / 150);
                        let isHubConnection = nodes[a].isHub || nodes[b].isHub;
                        ctx.beginPath(); ctx.moveTo(nodes[a].x, nodes[a].y); ctx.lineTo(nodes[b].x, nodes[b].y);
                        ctx.strokeStyle = isHubConnection ? `rgba(${COLOR_LIME_BASE}, ${opacity * 0.6})` : `rgba(${COLOR_LIME_BASE}, ${opacity * 0.2})`;
                        ctx.lineWidth = isHubConnection ? 1.2 : 0.5;
                        ctx.stroke();

                        if (isHubConnection && opacity > 0.3) {
                            let t = (time * 0.5 + nodes[b].offset) % 1; 
                            let startNode = nodes[a].isHub ? nodes[b] : nodes[a];
                            let endNode = nodes[a].isHub ? nodes[a] : nodes[b];
                            ctx.beginPath();
                            ctx.arc(startNode.x + (endNode.x - startNode.x) * t, startNode.y + (endNode.y - startNode.y) * t, 2, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(${COLOR_YELLOW_BASE}, ${opacity})`;
                            ctx.shadowBlur = 10; ctx.shadowColor = `rgba(${COLOR_YELLOW_BASE}, 1)`;
                            ctx.fill(); ctx.shadowBlur = 0; 
                        }
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            let time = Date.now() * 0.001; 
            drawBackground(); connectAndStreamData(time);
            nodes.forEach(node => node.update(time));
        }

        resize(); initNetwork(); animate();
    </script>
</body>
</html>
